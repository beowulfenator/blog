<head>
  <link href="https://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ 'assets/css/poole.css' | relative_url }}">
  <link rel="stylesheet" href="{{ 'assets/css/syntax.css' | relative_url }}">
  <link rel="stylesheet" href="{{ 'assets/css/hyde.css' | relative_url }}">
  <link rel="stylesheet" href="{{ 'assets/css/comments.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Sans:400,400italic,700|Abril+Fatface">

  <!-- Icons -->
  <link rel="shortcut icon" href="{{ 'assets/favicon.ico' | relative_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">

  {% if page.is_post %}
    <link rel="stylesheet" href="{{ 'assets/css/ocs-ui.min.css' | relative_url }}" />
    <script src="{{ 'assets/js/ocs.min.js' | relative_url }}"></script>
  {% endif %}

  {% include ogtags.html %}
</head>
