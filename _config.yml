# Permalinks
permalink:        pretty

# Setup
title:            DIY Blog
tagline:          'Hobby woodworking'
description:      'Hobby woodworking with a dash of electronics.'
url:              https://blog.sirotkin.com.ua

author:
  name:           'Konstantin Sirotkin'
  url:            https://sirotkin.com.ua/

paginate:         5

plugins: [jekyll-paginate]

defaults:
  -
    scope:
      path: ""      # empty string for all files
      type: posts   # limit to posts
    values:
      is_post: true # automatically set is_post=true for all posts